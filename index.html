<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Scroll Gallery</title>

  <style>
    #gallery{
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      padding: 10px;
    }

  </style>
</head>
<body>
  
<div id="gallery"></div>

  <script>
    const apiKey = '3NNxJrdL9DFkFTxOL1q1JlfQn9OHPkVOLUNvSKJvX_s';
  const url = `https://api.unsplash.com/photos?page=1&per_page=10&client_id=${apiKey}`;  

    fetch(url)
  .then(response=>{

  if(response.ok){
    return response.json();
  }

  
  if(!response.ok){
    throw new Error("Something went wrong!")
  }
})

.then((data) => {
  console.log(data);
})

.catch((error) =>{
  console.error('Error:', error);
});

  </script>
</body>
</html>
