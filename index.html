<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Scroll Gallery</title>

  <style>
    #gallery{
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      padding: 10px;
    }

    #gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    #spinner{
      display: none;
      text-align: center;
      padding: 20px;
    }

  </style>
</head>
<body>
  
<div id="gallery"></div>
<div id="spinner">loading...</div>

  <script>
    const gallery = document.querySelector("#gallery");
    const spinner = document.querySelector("#spinner");


    let page = 1;
    
    let isLoading = false;
    

    const apiKey = '3NNxJrdL9DFkFTxOL1q1JlfQn9OHPkVOLUNvSKJvX_s';
  


    
function loadImages(){

  if(isLoading)
    return;

  isLoading = true;
  spinner.style.display = "block";

  const url = `https://api.unsplash.com/photos?page=${page}&per_page=20&client_id=${apiKey}`;  

    fetch(url)
  .then(response=>{

  if(response.ok){
    return response.json();
  }

  
  if(!response.ok){
    throw new Error("Something went wrong!")
  }
})

.then((data) => {

  data.forEach(photo=>{

  const imageUrl = photo.urls.small;
  const newImage = document.createElement("img");
  newImage.src = imageUrl;
  newImage.loading = "lazy";


  gallery.appendChild(newImage);
  });

  isLoading = false;
  spinner.style.display = "none";

  
 if(document.body.scrollHeight <= window.innerHeight){
  page +=1;
  loadImages();
  }
})

.catch((error) =>{
  console.error('Error:', error);
  isLoading = false;
  spinner.style.display = "none";
});

}

loadImages();

 function debounce (func, delay){
  let timer;
  return function(){
    clearTimeout(timer);
    timer = setTimeout(func, delay);
  }
}


window.addEventListener('scroll', debounce(function(){
  if((window.innerHeight + window.scrollY) >= document.body.offsetHeight){
  page += 1;
  loadImages();
  }

 }, 200));

  </script>
</body>
</html>
