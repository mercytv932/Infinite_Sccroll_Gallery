<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Scroll Gallery</title>

  <style>
    #gallery{
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      padding: 10px;
    }

    #gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

  </style>
</head>
<body>
  
<div id="gallery"></div>

  <script>
    const gallery = document.querySelector("#gallery");

    let page = 1;

    const apiKey = '3NNxJrdL9DFkFTxOL1q1JlfQn9OHPkVOLUNvSKJvX_s';
  

function loadImages(){

  const url = `https://api.unsplash.com/photos?page=${page}&per_page=30&client_id=${apiKey}`;  

    fetch(url)
  .then(response=>{

  if(response.ok){
    return response.json();
  }

  
  if(!response.ok){
    throw new Error("Something went wrong!")
  }
})

.then((data) => {
  console.log(data);

  data.forEach(photo=>{

  const imageUrl = photo.urls.small;
  const fullImageUrl = photo.urls.full;
  const newImage = document.createElement("img");
  newImage.src = imageUrl;

  gallery.appendChild(newImage);
  });

})

.catch((error) =>{
  console.error('Error:', error);
});

console.log(page);
}
loadImages();


window.addEventListener('scroll', function(){
  if((window.innerHeight + window.scrollY) >= document.body.offsetHeight){
    console.log("You have hit the bottom!");
  
  page += 1;
  loadImages();
  }
});


  </script>
</body>
</html>
